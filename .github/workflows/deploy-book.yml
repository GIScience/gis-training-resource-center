name: deploy-book

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify language book files
        run: |
          set -euo pipefail

          test -f content/en/_config.yml
          test -f content/en/_toc.yml

          test -f content/es/_config.yml
          test -f content/es/_toc.yml

          test -f content/fr/_config.yml
          test -f content/fr/_toc.yml

          echo "Language book config files found."

      - name: Build English book
        run: |
          set -euo pipefail
          jupyter-book build ./content/en --path-output english

      - name: Build Spanish book
        run: |
          set -euo pipefail
          jupyter-book build ./content/es --path-output spanish

      - name: Build French book
        run: |
          set -euo pipefail
          jupyter-book build ./content/fr --path-output french

      - name: Combine language builds into one Pages site
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/en
          mkdir -p _site/es
          mkdir -p _site/fr

          # English under /en/.
          rsync -a --delete english/_build/html/ _site/en/

          # Spanish under /es/.
          rsync -a --delete spanish/_build/html/ _site/es/

          # French under /fr/.
          rsync -a --delete french/_build/html/ _site/fr/

          # Redirect root to English.
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=en/">
              <title>GIS Training Resource Center</title>
              <link rel="canonical" href="en/">
            </head>
            <body>
              <p>Redirecting to <a href="en/">English version</a>.</p>
            </body>
          </html>
          HTML

          # Ensure GitHub Pages does not process the generated site with Jekyll.
          touch _site/.nojekyll

          echo "Created combined GitHub Pages site:"
          echo "  English: /en/"
          echo "  Spanish: /es/"
          echo "  French:  /fr/"
          echo ""
          find _site -maxdepth 3 -type f | sort | head -n 100

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4